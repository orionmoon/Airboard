# 🐳 Docker Compose Simple - Airboard
# Usage: docker-compose -f docker-compose.simple.yml up -d

version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: airboard-db
    environment:
      POSTGRES_DB: airboard
      POSTGRES_USER: airboard
      POSTGRES_PASSWORD: ${DB_PASSWORD:-airboard123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airboard"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Application Airboard (Frontend + Backend)
  airboard:
    build:
      context: ..
      dockerfile: docker-simple/Dockerfile
    container_name: airboard-app
    ports:
      - "80:80"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: airboard
      DB_USER: airboard
      DB_PASSWORD: ${DB_PASSWORD:-airboard123}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      GIN_MODE: ${GIN_MODE:-release}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: