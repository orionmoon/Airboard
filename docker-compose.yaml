version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: airboard-postgres
    environment:
      POSTGRES_DB: airboard
      POSTGRES_USER: airboard
      POSTGRES_PASSWORD: airboard123
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Go API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: airboard-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=airboard
      - DB_PASSWORD=airboard123
      - DB_NAME=airboard
      - JWT_SECRET=airboard-super-secret-key-2024
      - GIN_MODE=release
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Vue.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: airboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
